<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Jogo da Forca</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <h1>🎯 Jogo da Forca</h1>

        <canvas id="forca" width="200" height="250"></canvas>

        <div class="categoria"></div>

        <div class="palavra"></div>

        <div class="letras"></div>

        <div class="info">
            ❤️ Vidas: <span id="vidas"></span> |
            ⭐ Pontuação: <span id="pontuacao">0</span>
        </div>

        <div class="mensagem"></div>

        <button class="reiniciar" onclick="iniciarJogo()">🔄 Novo Jogo</button>
    </div>

    <script src="script.js"></script>
</body>

</html>
